<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داخلہ فارم - جامعہ اسلامیہ علی المرتضیٰ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="form-wrapper">
    <div class="form-container">
        
        <div class="header">
            <h1 class="madrasa-name">جامعہ اسلامیہ علی المرتضیٰ</h1>
            <h2 class="form-title">داخلہ مینجمنٹ سسٹم</h2>
        </div>

        <div class="bismillah-container">
            <div class="bismillah-text">بِسْمِ اللہِ الرَّحْمٰنِ الرَّحِیْمِ</div>
        </div>

        <form id="madarsaForm">
            <input type="hidden" id="editIndex"> 
            
            <div class="row">
                <div class="field-group">
                    <label>طالب علم کا نام:</label>
                    <input type="text" id="studentName" required>
                </div>
                <div class="field-group">
                    <label>والد کا نام:</label>
                    <input type="text" id="fatherName" required>
                </div>
            </div>

            <div class="row">
                <div class="field-group">
                    <label>عمر:</label>
                    <input type="number" id="age" required>
                </div>
                <div class="field-group">
                    <label>مطلوبہ درجہ:</label>
                    <select id="darja" required>
                        <option value="">انتخاب کریں</option>
                        <option value="الأولى">الأولى</option>
                        <option value="الثانية">الثانية</option>
                        <option value="الثالثة">الثالثة</option>
                        <option value="الرابعة">الرابعة</option>
                        <option value="الخامسة">الخامسة</option>
                        <option value="السادسة">السادسة</option>
                        <option value="السابعة">السابعة</option>
                        <option value="الثامنة">الثامنة</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">ریکارڈ محفوظ کریں</button>
        </form>

        <hr>

        <h3 style="text-align: center;">موجودہ طلباء کی فہرست</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>نام</th>
                        <th>ولدیت</th>
                        <th>درجہ</th>
                        <th>عمر</th>
                        <th>آپریشن</th>
                    </tr>
                </thead>
                <tbody id="recordList">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
