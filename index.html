<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داخلہ فارم - جامعہ اسلامیہ علی المرتضیٰ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* مکمل ڈیزائن یہاں ہے تاکہ فائل لنک کا مسئلہ نہ ہو */
        body {
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            font-family: "Jameel Noori Nastaliq", "Noto Nastaliq Urdu", serif;
            display: flex;
            justify-content: center;
        }

        .form-container {
            background: #ffffff;
            width: 100%;
            max-width: 850px;
            padding: 40px;
            border: 2px solid #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .madrasa-name {
            font-family: "Traditional Arabic", "Sakkal Majalla", serif;
            font-size: clamp(35px, 5vw, 55px);
            font-weight: bold;
            color: #000;
            margin: 0;
        }

        .form-title {
            font-size: 22px;
            color: #444;
            margin-top: 5px;
            border-bottom: 2px solid #333;
            display: inline-block;
            padding-bottom: 5px;
        }

        .bismillah-container {
            text-align: center;
            margin: 20px 0;
            font-size: 28px;
            font-weight: bold;
        }

        .row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .field-group {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        label {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        input, select {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: inherit;
            font-size: 16px;
            background: #f9f9f9;
        }

        .submit-btn {
            width: 100%;
            background: #000;
            color: #fff;
            padding: 15px;
            font-size: 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            margin-top: 10px;
        }

        hr {
            margin: 40px 0;
            border: 0;
            border-top: 1px solid #eee;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #fff;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #000;
            color: white;
        }

        .edit-btn { background: #27ae60; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 3px; margin-left: 5px; }
        .delete-btn { background: #c0392b; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 3px; }

        @media (max-width: 600px) {
            .field-group { min-width: 100%; }
            .madrasa-name { font-size: 30px; }
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <h1 class="madrasa-name">جامعہ اسلامیہ علی المرتضیٰ</h1>
        <h2 class="form-title">داخلہ مینجمنٹ سسٹم</h2>
    </div>

    <div class="bismillah-container">بِسْمِ اللہِ الرَّحْمٰنِ الرَّحِیْمِ</div>

    <form id="madarsaForm">
        <input type="hidden" id="editIndex">
        
        <div class="row">
            <div class="field-group">
                <label>طالب علم کا نام:</label>
                <input type="text" id="studentName" placeholder="نام درج کریں" required>
            </div>
            <div class="field-group">
                <label>والد کا نام:</label>
                <input type="text" id="fatherName" placeholder="والد کا نام درج کریں" required>
            </div>
        </div>

        <div class="row">
            <div class="field-group">
                <label>عمر (سال):</label>
                <input type="number" id="age" required>
            </div>
            <div class="field-group">
                <label>مطلوبہ درجہ:</label>
                <select id="darja" required>
                    <option value="">انتخاب کریں</option>
                    <option value="الأولى">الأولى</option>
                    <option value="الثانية">الثانية</option>
                    <option value="الثالثة">الثالثة</option>
                    <option value="الرابعة">الرابعة</option>
                    <option value="الخامسة">الخامسة</option>
                    <option value="السادسة">السادسة</option>
                    <option value="السابعة">السابعة</option>
                    <option value="الثامنة">الثامنة</option>
                </select>
            </div>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn">ریکارڈ محفوظ کریں</button>
    </form>

    <hr>

    <h3 style="text-align: center;">موجودہ طلباء کی فہرست</h3>
    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>نام</th>
                    <th>ولدیت</th>
                    <th>درجہ</th>
                    <th>عمر</th>
                    <th>آپریشن</th>
                </tr>
            </thead>
            <tbody id="recordList"></tbody>
        </table>
    </div>
</div>

<script>
    // جاوا اسکرپٹ لاجک
    let students = JSON.parse(localStorage.getItem('madarsaData')) || [];
    const form = document.getElementById('madarsaForm');
    const recordList = document.getElementById('recordList');
    const submitBtn = document.getElementById('submitBtn');
    const editIndexField = document.getElementById('editIndex');

    function displayRecords() {
        recordList.innerHTML = "";
        students.forEach((data, index) => {
            recordList.innerHTML += `
                <tr>
                    <td>${data.name}</td>
                    <td>${data.father}</td>
                    <td>${data.darja}</td>
                    <td>${data.age}</td>
                    <td>
                        <button class="edit-btn" onclick="editRecord(${index})">تبدیل</button>
                        <button class="delete-btn" onclick="deleteRecord(${index})">ختم</button>
                    </td>
                </tr>`;
        });
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const studentData = {
            name: document.getElementById('studentName').value,
            father: document.getElementById('fatherName').value,
            age: document.getElementById('age').value,
            darja: document.getElementById('darja').value
        };
        const index = editIndexField.value;
        if (index === "") {
            students.push(studentData);
        } else {
            students[index] = studentData;
            editIndexField.value = "";
            submitBtn.innerText = "ریکارڈ محفوظ کریں";
        }
        localStorage.setItem('madarsaData', JSON.stringify(students));
        form.reset();
        displayRecords();
    });

    window.deleteRecord = function(index) {
        if (confirm("کیا آپ اسے ختم کرنا چاہتے ہیں؟")) {
            students.splice(index, 1);
            localStorage.setItem('madarsaData', JSON.stringify(students));
            displayRecords();
        }
    }

    window.editRecord = function(index) {
        const data = students[index];
        document.getElementById('studentName').value = data.name;
        document.getElementById('fatherName').value = data.father;
        document.getElementById('age').value = data.age;
        document.getElementById('darja').value = data.darja;
        editIndexField.value = index;
        submitBtn.innerText = "اپڈیٹ کریں";
        window.scrollTo(0, 0);
    }

    displayRecords();
</script>

</body>
</html>
